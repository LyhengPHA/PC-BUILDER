name: pc_builder_app
description: PC Builder App - Build custom PCs with Firebase backend
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.27.0
  firebase_auth: ^4.18.0
  cloud_firestore: ^4.15.0
  intl: ^0.19.0
  uuid: ^4.3.3
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  image_picker: 1.2.1
  http: ^1.6.0
  shared_preferences: ^2.5.5
  flutter_native_splash: ^2.4.1    # ← added

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1   # ← add here

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/                      # ← added

# Splash screen config              # ← added
flutter_native_splash:
  color: "#0D47A1"
  image: assets/splash_icon.png
  color_dark: "#0D47A1"
  image_dark: assets/splash_icon.png
  android_12:
    color: "#0D47A1"
    image: assets/splash_icon.png